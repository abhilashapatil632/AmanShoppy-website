<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Aman Shoppy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page" data-page="dashboard">
  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <aside class="mobile-drawer" id="mobileDrawer" aria-label="Mobile navigation">
    <button class="icon-btn" id="closeMobile" aria-label="Close menu">✕</button>
    <ul class="mobile-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#mens">Shop</a></li>
      <li><button type="button" class="dash-nav-btn" id="mobileLogoutBtn" style="width:100%;text-align:left;">Logout</button></li>
    </ul>
  </aside>

  <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
    <div class="cart-head">
      <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: #8f7020;">Your Cart</h3>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot">
      <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
        <strong>Total</strong>
        <strong id="cartTotal">Rs. 0</strong>
      </div>
      <button class="btn-gold" id="checkoutOpen" style="width:100%;" aria-label="Proceed to checkout">Checkout</button>
    </div>
  </aside>

  <section class="checkout-modal" id="checkoutModal" aria-hidden="true">
    <div class="checkout-card" role="dialog" aria-modal="true" aria-labelledby="checkoutTitle">
      <button class="icon-btn close-login" id="closeCheckout" aria-label="Close checkout">✕</button>
      <h3 id="checkoutTitle">Secure Checkout</h3>

      <div class="checkout-grid">
        <form id="checkoutForm" novalidate>
          <div class="checkout-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" required>
            <p class="field-error" id="nameError" aria-live="polite"></p>
          </div>

          <div class="checkout-group">
            <label for="phoneNumber">Phone Number</label>
            <input id="phoneNumber" name="phoneNumber" type="tel" required>
            <p class="field-error" id="phoneError" aria-live="polite"></p>
          </div>

          <div class="checkout-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" required></textarea>
            <p class="field-error" id="addressError" aria-live="polite"></p>
          </div>

          <div class="checkout-group">
            <label for="city">City</label>
            <input id="city" name="city" type="text" required>
            <p class="field-error" id="cityError" aria-live="polite"></p>
          </div>

          <div class="checkout-group">
            <label for="pincode">Pincode</label>
            <input id="pincode" name="pincode" type="text" required>
            <p class="field-error" id="pincodeError" aria-live="polite"></p>
          </div>

          <fieldset class="payment-methods">
            <legend style="color: var(--gold); margin-bottom: 6px;">Payment Method</legend>
            <label><input type="radio" name="paymentMethod" value="cod" checked> Cash on Delivery</label>
            <label><input type="radio" name="paymentMethod" value="upi"> UPI (Google Pay / PhonePe / Paytm)</label>
            <label><input type="radio" name="paymentMethod" value="card"> Card Payment</label>
          </fieldset>

          <div class="payment-extra" id="upiSection">
            <div class="checkout-group">
              <label for="upiId">UPI ID</label>
              <input id="upiId" type="text" placeholder="yourname@upi">
              <p class="field-error" id="upiError" aria-live="polite"></p>
            </div>
            <div class="qr-box">QR Placeholder</div>
          </div>

          <div class="payment-extra" id="cardSection">
            <div class="checkout-group">
              <label for="cardNumber">Card Number</label>
              <input id="cardNumber" type="text" inputmode="numeric" placeholder="1234 5678 9012 3456">
              <p class="field-error" id="cardError" aria-live="polite"></p>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
              <div class="checkout-group">
                <label for="expiryDate">Expiry Date</label>
                <input id="expiryDate" type="text" placeholder="MM/YY">
                <p class="field-error" id="expiryError" aria-live="polite"></p>
              </div>
              <div class="checkout-group">
                <label for="cvv">CVV</label>
                <input id="cvv" type="password" inputmode="numeric" placeholder="123">
                <p class="field-error" id="cvvError" aria-live="polite"></p>
              </div>
            </div>
          </div>
        </form>

        <aside class="summary-box" aria-label="Order summary">
          <h4 style="font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 1.5rem; margin-bottom: 8px;">Order Summary</h4>
          <div id="checkoutSummaryItems" class="summary-items"></div>
          <div style="display:flex; justify-content: space-between; margin-bottom: 6px;">
            <strong>Total Qty</strong><strong id="checkoutTotalQty">0</strong>
          </div>
          <div style="display:flex; justify-content: space-between;">
            <strong>Total Amount</strong><strong id="checkoutTotalAmount">Rs. 0</strong>
          </div>
        </aside>
      </div>

      <div class="checkout-actions">
        <button class="btn-gold" id="placeOrderBtn" type="button" aria-label="Place order" disabled>Place Order</button>
        <button class="btn-outline" id="cancelCheckout" type="button" aria-label="Cancel checkout">Cancel</button>
      </div>
    </div>
  </section>

  <header class="navbar">
    <div class="container nav-wrap">
      <a class="logo" href="index.html" aria-label="Aman Shoppy home">
        <img alt="Aman Shoppy logo" src="assets/logo.jpeg" width="40" height="40">
        <span>AMAN SHOPPY</span>
      </a>
      <nav aria-label="Dashboard navigation">
        <ul class="menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#mens">Shop</a></li>
        </ul>
      </nav>
      <div class="nav-icons">
        <button class="icon-btn" id="wishlistToggle" aria-label="Wishlist count">♡<span class="badge" id="wishCount">0</span></button>
        <button class="icon-btn" id="cartToggle" aria-label="Open shopping cart">🛒<span class="badge" id="cartCount">0</span></button>
        <button type="button" class="account-btn" id="navLogoutBtn">Logout</button>
      </div>
      <button class="icon-btn hamburger" id="openMobile" aria-label="Open menu">☰</button>
    </div>
  </header>

  <main class="container">
    <div class="dashboard-shell" role="application" aria-label="My Account Dashboard">
      <aside class="dashboard-sidebar" aria-label="Dashboard sections">
        <h3 class="dashboard-title" id="dashboardTitle">My Account Dashboard</h3>
        <button class="dash-nav-btn active" data-dash-tab="overview" type="button">Dashboard</button>
        <button class="dash-nav-btn" data-dash-tab="orders" type="button">My Orders</button>
        <button class="dash-nav-btn" data-dash-tab="wishlist" type="button">Wishlist</button>
        <button class="dash-nav-btn" data-dash-tab="profile" type="button">Profile Settings</button>
        <button class="dash-nav-btn" id="dashboardLogoutBtn" type="button">Logout</button>
      </aside>

      <div class="dashboard-main">
        <div class="order-top">
          <h3 style="font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 2rem;">Overview</h3>
        </div>

        <section class="dash-panel active" id="dash-overview">
          <div class="dash-overview-grid">
            <article class="dash-stat"><h4>Total Orders</h4><p id="dashTotalOrders">0</p></article>
            <article class="dash-stat"><h4>Wishlist Items</h4><p id="dashTotalWishlist">0</p></article>
            <article class="dash-stat"><h4>Cart Items</h4><p id="dashTotalCart">0</p></article>
          </div>
        </section>

        <section class="dash-panel" id="dash-orders">
          <div class="dashboard-orders-list" id="dashboardOrdersList"></div>
        </section>

        <section class="dash-panel" id="dash-wishlist">
          <div class="dashboard-wishlist-grid" id="dashboardWishlistGrid"></div>
        </section>

        <section class="dash-panel" id="dash-profile">
          <form class="dash-form" id="profileForm" novalidate>
            <div class="checkout-group">
              <label for="profileFullName">Full Name</label>
              <input id="profileFullName" type="text" required>
            </div>
            <div class="checkout-group">
              <label for="profileEmail">Email</label>
              <input id="profileEmail" type="email" required>
            </div>
            <div class="checkout-group">
              <label for="profilePhone">Phone</label>
              <input id="profilePhone" type="tel" required>
            </div>
            <div class="checkout-group">
              <label for="profileAddress">Address</label>
              <textarea id="profileAddress" required></textarea>
            </div>
            <div style="display:flex; gap: 10px; align-items: center; flex-wrap: wrap;">
              <button class="btn-gold" type="submit">Save Profile</button>
              <p class="profile-msg" id="profileMsg" aria-live="polite"></p>
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>

  <script src="js/script.js" defer></script>
</body>
</html>
